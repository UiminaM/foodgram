global:
  namespace: foodgram
  domain: foodgram.local
  persistence:
    collectedStatic:
      enabled: true
      name: collected-static-pvc
      accessModes:
        - ReadWriteOnce
      storage: 1Gi
    media:
      enabled: true
      name: media-pvc
      accessModes:
        - ReadWriteOnce
      storage: 1Gi

ingress:
  className: nginx

database:
  port: 5432

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "13-alpine" 
  auth:
    username: ref+vault://secret/foodgram/#POSTGRES_USER
    password: ref+vault://secret/foodgram/#POSTGRES_PASSWORD
    database: ref+vault://secret/foodgram/#POSTGRES_DB
  primary:
    persistence:
      enabled: true
      size: 1Gi
      storageClass: standard

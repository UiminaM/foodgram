namespace: foodgram
domain: foodgram.local
replicaCount: 1

ingress:
  className: nginx

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "13-alpine" 
  auth:
    username: ref+vault://secret/foodgram/#POSTGRES_USER
    password: ref+vault://secret/foodgram/#POSTGRES_PASSWORD
    database: ref+vault://secret/foodgram/#POSTGRES_DB
  primary:
    persistence:
      enabled: true
      size: 1Gi
      storageClass: standard

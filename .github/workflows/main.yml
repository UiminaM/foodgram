name: Main Foodgram Workflow

on:
  push:
    branches:
      - main

jobs:
  lint-backend:
    name: Lint backend
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install ruff
        run: pip install ruff==0.11.9
      - name: Run ruff
        run: python -m ruff check backend/

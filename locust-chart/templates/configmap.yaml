apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.locust.name }}-locustfile
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: foodgram-locust
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  locustfile.py: |
{{ .Files.Get "files/locustfile.py" | indent 4 }}
